{% extends "base.html" %}

{% block content %}
<div class="flex items-center justify-center min-h-[85vh] py-10">
    <div
        class="bg-white/80 backdrop-blur-xl border border-white/50 shadow-2xl rounded-3xl overflow-hidden max-w-5xl w-full flex flex-col md:flex-row relative z-10">

        <!-- Left Side: Gradient Promo (Visual) -->
        <div
            class="md:w-1/2 bg-gradient-to-br from-emerald-500 to-teal-600 p-12 text-white flex flex-col justify-center relative overflow-hidden order-last md:order-first">

            <!-- Decorative Blobs within the card -->
            <div class="absolute -top-10 -left-10 w-48 h-48 bg-white/20 rounded-full blur-2xl"></div>
            <div class="absolute bottom-10 -right-10 w-48 h-48 bg-emerald-400/30 rounded-full blur-2xl animate-pulse">
            </div>

            <div class="relative z-10">
                <h2 class="text-4xl font-bold mb-6 tracking-tight leading-tight">Begin Your<br>Transformation.</h2>
                <p class="text-emerald-50 text-lg mb-8 font-light">"Mental wellness is a journey, not a destination.
                    Let's walk this path together."</p>
                <div class="flex justify-center md:justify-start">
                    <div class="flex -space-x-4">
                        <div class="w-10 h-10 rounded-full border-2 border-emerald-500 bg-white/30 backdrop-blur-sm">
                        </div>
                        <div class="w-10 h-10 rounded-full border-2 border-emerald-500 bg-white/40 backdrop-blur-sm">
                        </div>
                        <div
                            class="w-10 h-10 rounded-full border-2 border-emerald-500 bg-white/50 backdrop-blur-sm flex items-center justify-center text-xs font-bold">
                            +2k</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Right Side: Form -->
        <div class="md:w-1/2 p-10 md:p-14 bg-white/40 backdrop-blur-sm">
            <h3 class="text-2xl font-bold text-slate-800 mb-8 text-center pt-10 md:pt-0">Create Account</h3>

            <form method="POST" class="space-y-5">
                <!-- Username -->
                <div class="space-y-2">
                    <label class="block text-slate-600 text-sm font-bold ml-1" for="username">Username</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-slate-400">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                            </svg>
                        </span>
                        <input
                            class="w-full pl-11 pr-4 py-3 bg-slate-50 border-0 ring-1 ring-slate-200 focus:ring-2 focus:ring-teal-500 rounded-xl transition-all duration-200 text-slate-700 placeholder-slate-400 shadow-inner"
                            id="username" name="username" type="text" placeholder="Choose a username" required
                            minlength="3" value="{{ username if username else '' }}">
                    </div>
                </div>

                <!-- Email -->
                <div class="space-y-2">
                    <label class="block text-slate-600 text-sm font-bold ml-1" for="email">Email</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-slate-400">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z">
                                </path>
                            </svg>
                        </span>
                        <input
                            class="w-full pl-11 pr-4 py-3 bg-slate-50 border-0 ring-1 ring-slate-200 focus:ring-2 focus:ring-teal-500 rounded-xl transition-all duration-200 text-slate-700 placeholder-slate-400 shadow-inner"
                            id="email" name="email" type="email" placeholder="Enter your email" required minlength="8"
                            value="{{ email if email else '' }}">
                    </div>
                </div>

                <!-- Password -->
                <div class="space-y-2">
                    <label class="block text-slate-600 text-sm font-bold ml-1" for="password">Password</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-slate-400">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z">
                                </path>
                            </svg>
                        </span>
                        <input
                            class="w-full pl-11 pr-12 py-3 bg-slate-50 border-0 ring-1 ring-slate-200 focus:ring-2 focus:ring-teal-500 rounded-xl transition-all duration-200 text-slate-700 placeholder-slate-400 shadow-inner"
                            id="password" name="password" type="password" placeholder="Create a password" required
                            minlength="8">
                        <button type="button" onclick="togglePassword('password', 'reg-pass-icon')"
                            class="absolute inset-y-0 right-0 flex items-center pr-4 text-slate-400 hover:text-teal-600 focus:outline-none">
                            <svg id="reg-pass-icon" class="w-5 h-5" fill="none" stroke="currentColor"
                                viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                            </svg>
                        </button>
                    </div>
                    <p class="text-[10px] text-slate-500 mt-1 ml-1 space-y-0.5">
                        Must contain: <span id="req-upper" class="text-slate-400">1 Upper</span>,
                        <span id="req-lower" class="text-slate-400">1 Lower</span>,
                        <span id="req-num" class="text-slate-400">1 Number</span>,
                        <span id="req-spec" class="text-slate-400">1 Special</span>.
                    </p>
                    <!-- Password Strength Meter -->
                    <div class="mt-2 text-right">
                        <div class="h-1.5 w-full bg-slate-200/50 rounded-full overflow-hidden backdrop-blur-sm">
                            <div id="password-strength-bar" class="h-full w-0 transition-all duration-300"></div>
                        </div>
                        <p id="password-strength-text" class="text-xs mt-1 text-slate-500 font-semibold min-h-[1rem]">
                        </p>
                    </div>
                </div>

                <!-- Confirm Password -->
                <div class="space-y-2">
                    <label class="block text-slate-600 text-sm font-bold ml-1" for="confirm_password">Confirm
                        Password</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-slate-400">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z">
                                </path>
                            </svg>
                        </span>
                        <input
                            class="w-full pl-11 pr-12 py-3 bg-slate-50 border-0 ring-1 ring-slate-200 focus:ring-2 focus:ring-teal-500 rounded-xl transition-all duration-200 text-slate-700 placeholder-slate-400 shadow-inner"
                            id="confirm_password" name="confirm_password" type="password"
                            placeholder="Confirm your password" required minlength="8">
                        <button type="button" onclick="togglePassword('confirm_password', 'reg-confirm-icon')"
                            class="absolute inset-y-0 right-0 flex items-center pr-4 text-slate-400 hover:text-teal-600 focus:outline-none">
                            <svg id="reg-confirm-icon" class="w-5 h-5" fill="none" stroke="currentColor"
                                viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                            </svg>
                        </button>
                    </div>
                </div>

                <button
                    class="w-full bg-gradient-to-r from-teal-500 to-emerald-500 hover:from-teal-600 hover:to-emerald-600 text-white font-bold py-3.5 px-4 rounded-full shadow-lg shadow-teal-500/30 hover:shadow-teal-500/40 transform hover:-translate-y-0.5 transition-all duration-200 mt-2"
                    type="submit">
                    Register
                </button>
            </form>

            <p class="text-center mt-8 text-sm text-slate-500">
                Already have an account?
                <a href="{{ url_for('login') }}"
                    class="text-indigo-600 font-bold hover:text-indigo-800 hover:underline transition-colors">Login</a>
            </p>
        </div>
    </div>
</div>

<script>
    const passwordInput = document.getElementById('password');
    const strengthBar = document.getElementById('password-strength-bar');
    const strengthText = document.getElementById('password-strength-text');

    if (passwordInput && strengthBar && strengthText) {
        passwordInput.addEventListener('input', function () {
            const val = passwordInput.value;
            let criteriaMet = 0;
            const hasUpper = /[A-Z]/.test(val);
            const hasLower = /[a-z]/.test(val);
            const hasNum = /\d/.test(val);
            const hasSpec = /[^A-Za-z0-9]/.test(val);
            const hasLen = val.length >= 8;

            // Visual feedback for requirements
            const reqUpper = document.getElementById('req-upper');
            const reqLower = document.getElementById('req-lower');
            const reqNum = document.getElementById('req-num');
            const reqSpec = document.getElementById('req-spec');

            if (reqUpper) reqUpper.className = hasUpper ? 'text-teal-600 font-bold' : 'text-slate-400';
            if (reqLower) reqLower.className = hasLower ? 'text-teal-600 font-bold' : 'text-slate-400';
            if (reqNum) reqNum.className = hasNum ? 'text-teal-600 font-bold' : 'text-slate-400';
            if (reqSpec) reqSpec.className = hasSpec ? 'text-teal-600 font-bold' : 'text-slate-400';

            if (hasLen && hasUpper && hasLower && hasNum && hasSpec) {
                criteriaMet = 5;
            } else {
                if (hasLen) criteriaMet++;
                if (hasUpper) criteriaMet++;
                if (hasLower) criteriaMet++;
                if (hasNum) criteriaMet++;
                if (hasSpec) criteriaMet++;
            }

            // Reset classes
            strengthBar.className = 'h-full transition-all duration-300';

            if (val.length === 0) {
                strengthBar.style.width = '0%';
                strengthText.textContent = '';
                return;
            }

            if (criteriaMet <= 2) {
                strengthBar.style.width = '20%';
                strengthBar.classList.add('bg-rose-500');
                strengthText.textContent = 'Weak';
                strengthText.className = 'text-xs mt-1 text-rose-500 font-semibold';
            } else if (criteriaMet <= 4) {
                strengthBar.style.width = '60%';
                strengthBar.classList.add('bg-amber-500');
                strengthText.textContent = 'Medium';
                strengthText.className = 'text-xs mt-1 text-amber-600 font-semibold';
            } else {
                strengthBar.style.width = '100%';
                strengthBar.classList.add('bg-teal-500');
                strengthText.textContent = 'Strong';
                strengthText.className = 'text-xs mt-1 text-teal-600 font-semibold';
            }
        });
    }
</script>
{% endblock %}
