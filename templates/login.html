{% extends "base.html" %}

{% block content %}
<div class="flex items-center justify-center min-h-[75vh]">
    <div
        class="bg-white/80 backdrop-blur-xl border border-white/50 shadow-2xl rounded-3xl overflow-hidden max-w-5xl w-full flex flex-col md:flex-row relative z-10">

        <!-- Left Side: Gradient Promo (Visual) -->
        <div
            class="md:w-1/2 bg-gradient-to-br from-teal-500 to-indigo-600 p-12 text-white flex flex-col justify-center relative overflow-hidden">
            <!-- Decorative Blobs within the card -->
            <div
                class="absolute -top-10 -right-10 w-48 h-48 bg-teal-300 rounded-full mix-blend-multiply filter blur-3xl opacity-30 animate-blob">
            </div>
            <div
                class="absolute bottom-10 -left-10 w-48 h-48 bg-indigo-300 rounded-full mix-blend-multiply filter blur-3xl opacity-30 animate-blob animation-delay-2000">
            </div>

            <div class="relative z-10">
                <h2 class="text-4xl font-bold mb-6 tracking-tight leading-tight">Welcome Back,<br>Wellness Warrior.</h2>
                <p class="text-teal-50 text-lg mb-8 font-light">"The journey of a thousand miles begins with a single
                    step. Login to continue yours."</p>
                <div class="flex items-center space-x-2 opacity-80">
                    <div class="w-3 h-3 bg-white rounded-full animate-pulse"></div>
                    <div class="w-3 h-3 bg-white rounded-full animate-pulse delay-75"></div>
                    <div class="w-3 h-3 bg-white rounded-full animate-pulse delay-150"></div>
                </div>
            </div>
        </div>

        <!-- Right Side: Login Form -->
        <div class="md:w-1/2 p-10 md:p-14 bg-white/40 backdrop-blur-sm">
            <h3 class="text-2xl font-bold text-slate-800 mb-8 text-center pt-10 md:pt-0">Sign In</h3>

            <form method="POST" class="space-y-6">
                <div class="space-y-2">
                    <label class="block text-slate-600 text-sm font-bold ml-1" for="username">Username</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-slate-400">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                            </svg>
                        </span>
                        <input
                            class="w-full pl-11 pr-4 py-3 bg-slate-50 border-0 ring-1 ring-slate-200 focus:ring-2 focus:ring-teal-500 rounded-xl transition-all duration-200 text-slate-700 placeholder-slate-400 shadow-inner"
                            id="username" name="username" type="text" placeholder="Enter your username" required>
                    </div>
                </div>

                <div class="space-y-2">
                    <div class="flex justify-between items-center ml-1">
                        <label class="block text-slate-600 text-sm font-bold" for="password">Password</label>
                        <a href="{{ url_for('forgot_password') }}"
                            class="text-xs text-indigo-600 hover:text-indigo-800 font-semibold transition-colors">Forgot
                            Password?</a>
                    </div>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-slate-400">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z">
                                </path>
                            </svg>
                        </span>
                        <input
                            class="w-full pl-11 pr-12 py-3 bg-slate-50 border-0 ring-1 ring-slate-200 focus:ring-2 focus:ring-teal-500 rounded-xl transition-all duration-200 text-slate-700 placeholder-slate-400 shadow-inner"
                            id="password" name="password" type="password" placeholder="Enter your password" required>
                        <button type="button" onclick="togglePassword('password', 'login-eye-icon')"
                            class="absolute inset-y-0 right-0 flex items-center pr-4 text-slate-400 hover:text-teal-600 focus:outline-none">
                            <svg id="login-eye-icon" class="w-5 h-5" fill="none" stroke="currentColor"
                                viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                            </svg>
                        </button>
                    </div>
                </div>

                <button
                    class="w-full bg-gradient-to-r from-teal-500 to-emerald-500 hover:from-teal-600 hover:to-emerald-600 text-white font-bold py-3.5 px-4 rounded-full shadow-lg shadow-teal-500/30 hover:shadow-teal-500/40 transform hover:-translate-y-0.5 transition-all duration-200 mt-2"
                    type="submit">
                    Login
                </button>
            </form>

            <p class="text-center mt-8 text-sm text-slate-500">
                New here?
                <a href="{{ url_for('register') }}"
                    class="text-indigo-600 font-bold hover:text-indigo-800 hover:underline transition-colors">Create an
                    account</a>
            </p>
        </div>
    </div>
</div>

<style>
    @keyframes blob {
        0% {
            transform: translate(0px, 0px) scale(1);
        }

        33% {
            transform: translate(30px, -50px) scale(1.1);
        }

        66% {
            transform: translate(-20px, 20px) scale(0.9);
        }

        100% {
            transform: translate(0px, 0px) scale(1);
        }
    }

    .animate-blob {
        animation: blob 7s infinite;
    }

    .animation-delay-2000 {
        animation-delay: 2s;
    }
</style>
{% endblock %}
